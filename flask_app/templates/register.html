{% extends "base.html" %}
{% block title %}新規登録 | 茨城県 不動産価格分析{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">🏠</div>
            <h1>新規登録</h1>
            <p>無料アカウントを作成します</p>
        </div>

        <form method="POST" action="{{ url_for('register') }}">
            <div class="form-group">
                <label>ユーザー名</label>
                <input type="text" name="username" required placeholder="ユーザー名">
            </div>
            <div class="form-group">
                <label>メールアドレス</label>
                <input type="email" name="email" required placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label>パスワード（8文字以上）</label>
                <input type="password" name="password" required placeholder="パスワード">
            </div>
            <div class="form-group">
                <label>パスワード（確認）</label>
                <input type="password" name="confirm" required placeholder="パスワード（確認）">
            </div>
            <div class="form-group">
                <label style="display:flex; align-items:center; gap:8px; cursor:pointer; font-size:13px; font-weight:400; color:#555;">
                    <input type="checkbox" name="agree_terms" required>
                    <span><a href="{{ url_for('terms') }}" target="_blank" style="color:#3F51B5;">利用規約</a> および <a href="{{ url_for('privacy') }}" target="_blank" style="color:#3F51B5;">プライバシーポリシー</a> に同意します</span>
                </label>
            </div>
            <button type="submit" class="btn-primary">登録する</button>
        </form>

        <div class="auth-footer">
            すでにアカウントをお持ちの方は
            <a href="{{ url_for('login') }}">ログイン</a>
        </div>
    </div>
</div>
{% endblock %}
