{% extends "base.html" %}
{% block title %}お知らせ編集 | 管理者パネル{% endblock %}

{% block head %}
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Helvetica Neue', Arial, 'Hiragino Sans', sans-serif; background: #F5F7FA; color: #333; }
.admin-layout { display: flex; min-height: 100vh; }
.admin-sidebar {
    width: 220px; flex-shrink: 0; background: #1a237e; color: white;
    display: flex; flex-direction: column; padding: 20px 0;
}
.admin-sidebar-header { padding: 0 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.15); margin-bottom: 12px; }
.admin-sidebar-header h1 { font-size: 14px; font-weight: 700; line-height: 1.4; }
.admin-sidebar-header p { font-size: 10px; opacity: 0.6; margin-top: 4px; }
.admin-nav a {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px; font-size: 13px; color: white;
    text-decoration: none; opacity: 0.75; transition: all 0.15s;
    border-radius: 6px; margin: 2px 8px;
}
.admin-nav a:hover, .admin-nav a.active { background: rgba(255,255,255,0.15); opacity: 1; }
.admin-sidebar-footer { margin-top: auto; padding: 12px 16px; font-size: 10px; opacity: 0.4; }
.admin-main { flex: 1; display: flex; flex-direction: column; }
.admin-topbar {
    background: white; padding: 14px 28px;
    border-bottom: 1px solid #E8ECF0;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}
.admin-topbar h2 { font-size: 18px; font-weight: 700; color: #1a237e; }
.admin-topbar a { font-size: 13px; color: #666; text-decoration: none; }
.admin-content { padding: 28px; }
.card { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow: hidden; }
.card-header { padding: 16px 24px; border-bottom: 1px solid #F0F0F0; font-size: 15px; font-weight: 700; }
.card-body { padding: 24px; }
textarea { width: 100%; height: 300px; padding: 12px; border: 1px solid #DDD; border-radius: 8px; font-size: 14px; line-height: 1.7; resize: vertical; outline: none; font-family: inherit; }
textarea:focus { border-color: #3F51B5; }
.btn-save { padding: 12px 32px; background: #1a237e; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 16px; }
.btn-save:hover { background: #283593; }
</style>
{% endblock %}

{% block content %}
<div class="admin-layout">
    <div class="admin-sidebar">
        <div class="admin-sidebar-header">
            <h1>🛡️ 管理者パネル</h1>
            <p>茨城県 不動産価格分析</p>
        </div>
        <nav class="admin-nav">
            <a href="{{ url_for('admin_index') }}">👥 ユーザー管理</a>
            <a href="{{ url_for('admin_notice') }}" class="active">📢 お知らせ編集</a>
            <a href="{{ url_for('admin_pages') }}">📄 ページ設定</a>
            <a href="{{ url_for('dashboard') }}">🏠 サイトへ戻る</a>
        </nav>
        <div class="admin-sidebar-footer">管理者専用画面</div>
    </div>
    <div class="admin-main">
        <div class="admin-topbar">
            <h2>📢 お知らせ編集</h2>
            <a href="{{ url_for('admin_index') }}">← ユーザー管理へ</a>
        </div>
        <div class="admin-content">
            <div class="card">
                <div class="card-header">📢 お知らせ本文</div>
                <div class="card-body">
                    <form method="POST">
                        <textarea name="notice" placeholder="お知らせを入力してください...">{{ notice_text }}</textarea>
                        <br>
                        <button type="submit" class="btn-save">💾 保存する</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
