<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>茨城県 駅距離別価格</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #F8F9FA; }
        .header {
            background: linear-gradient(135deg, #1a237e, #1565C0);
            color: white; padding: 20px 28px;
        }
        .header h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
        .header p  { font-size: 12px; opacity: 0.75; }
        .tab-bar {
            display: flex; background: white;
            border-bottom: 2px solid #E0E0E0; padding: 0 24px;
        }
        .tab-btn {
            padding: 12px 24px; border: none; background: transparent;
            font-size: 14px; font-weight: 500; color: #888; cursor: pointer;
            border-bottom: 3px solid transparent; margin-bottom: -2px;
            transition: all 0.2s;
        }
        .tab-btn:hover  { color: #1565C0; }
        .tab-btn.active { color: #1565C0; border-bottom: 3px solid #1565C0; }
        .toggle-bar {
            display: flex; align-items: center; gap: 12px;
            background: white; padding: 10px 28px;
            border-bottom: 1px solid #EEE;
            font-size: 13px; color: #555;
        }
        .toggle-btn {
            padding: 5px 16px; border: 1px solid #DDD;
            border-radius: 20px; background: white;
            font-size: 12px; cursor: pointer; color: #555;
            transition: all 0.2s;
        }
        .toggle-btn.active { background: #1565C0; color: white; border-color: #1565C0; }
        .content { padding: 20px 28px; }
        .graph-card {
            background: white; border-radius: 12px;
            padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .footer {
            text-align: center; padding: 12px;
            font-size: 11px; color: #AAA;
            border-top: 1px solid #EEE; margin-top: 16px;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🚉 茨城県 最寄り駅距離別 平均取引価格</h1>
    <p>出典：国土交通省不動産情報ライブラリ</p>
</div>

<div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('mansion', this)">🏢 中古マンション</button>
    <button class="tab-btn"        onclick="switchTab('land', this)">🏠 宅地（土地と建物）</button>
</div>

<div class="toggle-bar">
    <span>表示切替：</span>
    <button class="toggle-btn active" onclick="switchMetric('price', this)">平均価格（万円）</button>
    <button class="toggle-btn"        onclick="switchMetric('sqm', this)">㎡単価（円）</button>
</div>

<div class="content">
    <div class="graph-card">
        <div id="graph" style="width:100%; height:580px;"></div>
    </div>
</div>

<div class="footer">
    このサービスは、国土交通省不動産情報ライブラリのAPI機能を使用していますが、
    提供情報の最新性・正確性・完全性等が保証されたものではありません。
</div>

<script>
const DATA_M = {"labels": ["500m以内", "500m〜1km", "1〜2km", "2〜3km", "3〜5km", "5km超"], "price": [2643.2, 2468.4, 1188.4, 1329.8, 1860.3, 1907.1], "sqm": [338445.0, 309774.0, 162359.0, 169052.0, 219327.0, 200933.0], "count": [948, 1202, 683, 117, 59, 14]};
const DATA_L = {"labels": ["500m以内", "500m〜1km", "1〜2km", "2〜3km", "3〜5km", "5km超"], "price": [3806.0, 2466.5, 2551.6, 1828.6, 2110.8, 1666.4], "sqm": [133144.0, 96434.0, 92578.0, 68769.0, 69132.0, 46407.0], "count": [1290, 3458, 6282, 3173, 3094, 2416]};
const COLORS = ["#1B5E20", "#2E7D32", "#388E3C", "#66BB6A", "#A5D6A7", "#C8E6C9"];

let currentTab    = 'mansion';
let currentMetric = 'price';

function updateGraph() {
    const data    = currentTab === 'mansion' ? DATA_M : DATA_L;
    const isPrice = currentMetric === 'price';
    const yValues = isPrice ? data.price : data.sqm;
    const yTitle  = isPrice ? '平均取引価格（万円）' : '平均㎡単価（円）';
    const title   = currentTab === 'mansion'
        ? '茨城県 中古マンション 駅距離別 ' + (isPrice ? '平均価格' : '平均㎡単価')
        : '茨城県 宅地（土地と建物） 駅距離別 ' + (isPrice ? '平均価格' : '平均㎡単価');

    const traces = [{
        x: data.labels,
        y: yValues,
        type: 'bar',
        marker: { color: COLORS },
        text: yValues.map((v, i) =>
            `${isPrice ? v + '万円' : v.toLocaleString() + '円'}<br>(${data.count[i].toLocaleString()}件)`
        ),
        textposition: 'outside',
        hovertemplate: data.labels.map((l, i) =>
            `<b>${l}</b><br>` +
            (isPrice ? `平均価格: ${data.price[i]}万円` : `㎡単価: ${data.sqm[i].toLocaleString()}円`) +
            `<br>件数: ${data.count[i].toLocaleString()}件<extra></extra>`
        ),
        name: '',
    }];

    Plotly.react('graph', traces, {
        title: { text: title, font: { size: 16 }, x: 0.5, xanchor: 'center' },
        xaxis: {
            title: '最寄り駅までの距離',
            categoryorder: 'array',
            categoryarray: data.labels,
            gridcolor: '#EEEEEE',
        },
        yaxis: {
            title: yTitle,
            gridcolor: '#EEEEEE',
            zeroline: false,
            range: [0, Math.max(...yValues) * 1.25],
        },
        plot_bgcolor: 'white',
        paper_bgcolor: 'white',
        showlegend: false,
        margin: { l:70, r:30, t:80, b:60 },
        bargap: 0.3,
    });
}

function switchTab(tab, btn) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    updateGraph();
}

function switchMetric(metric, btn) {
    currentMetric = metric;
    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    updateGraph();
}

updateGraph();
</script>
</body>
</html>
