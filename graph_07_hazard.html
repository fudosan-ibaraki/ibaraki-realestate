const RISK_ORDER = ["高", "中", "低", "なし"];

const RISK_COLORS = {
    '高':  '#E53935',
    '中':  '#FB8C00',
    '低':  '#FDD835',
    'なし':'#43A047',
};

let currentMetric = 'price';

function updateGraph() {
    const isPrice = currentMetric === 'price';
    const yTitle  = isPrice ? '取引価格（万円）' : '㎡単価（円）';

    const traces = [];

    RISK_ORDER.forEach(risk => {
        const color = RISK_COLORS[risk];

        // マンション
        traces.push({
            type: 'box',
            y: DATA_M[risk],
            name: `${risk} マンション`,
            x0: risk,
            marker: { color: color, opacity: 0.8 },
            line: { color: color },
            fillcolor: color + '55',
            boxmean: true,
            legendgroup: risk,
            offsetgroup: 'mansion',
            hovertemplate:
                `<b>${risk}リスク・マンション</b><br>` +
                `最大: %{upperfence:.0f}万円<br>` +
                `第3四分位: %{q3:.0f}万円<br>` +
                `中央値: %{median:.0f}万円<br>` +
                `第1四分位: %{q1:.0f}万円<br>` +
                `最小: %{lowerfence:.0f}万円<extra></extra>`,
        });

        // 宅地
        traces.push({
            type: 'box',
            y: DATA_L[risk],
            name: `${risk} 宅地`,
            x0: risk,
            marker: { color: color, opacity: 0.5 },
            line: { color: color, dash: 'dot' },
            fillcolor: color + '22',
            boxmean: true,
            legendgroup: risk,
            offsetgroup: 'land',
            hovertemplate:
                `<b>${risk}リスク・宅地</b><br>` +
                `最大: %{upperfence:.0f}万円<br>` +
                `第3四分位: %{q3:.0f}万円<br>` +
                `中央値: %{median:.0f}万円<br>` +
                `第1四分位: %{q1:.0f}万円<br>` +
                `最小: %{lowerfence:.0f}万円<extra></extra>`,
        });
    });

    Plotly.react('graph', traces, {
        title: {
            text: '茨城県 浸水リスク別 取引価格分布（箱ひげ図）',
            font: { size: 16 }, x: 0.5, xanchor: 'center'
        },
        xaxis: {
            title: '浸水リスク',
            categoryorder: 'array',
            categoryarray: RISK_ORDER,
            gridcolor: '#EEEEEE',
        },
        yaxis: {
            title: yTitle,
            gridcolor: '#EEEEEE',
            zeroline: false,
            range: [0, 20000],
        },
        boxmode: 'group',
        plot_bgcolor: 'white',
        paper_bgcolor: 'white',
        legend: {
            orientation: 'h',
            x: 0.5, xanchor: 'center', y: -0.15,
            traceorder: 'grouped',
        },
        margin: { l:70, r:30, t:80, b:100 },
    });
}

function switchMetric(metric, btn) {
    currentMetric = metric;
    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    updateGraph();
}

updateGraph();
</script>
